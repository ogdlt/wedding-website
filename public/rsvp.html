<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RSVP</title>
    <link rel="stylesheet" href="../styles/main.css" />
  </head>

  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="event-details.html">Event Details</a>
      <a href="travel-stay.html">Travel & Stay</a>
      <a href="rsvp.html">RSVP</a>
      <a href="faq.html">FAQ</a>
    </nav>

    <h1>RSVP</h1>

    <form>
      <form>
        <label>Full name:</label><br />
        <input type="text" name="fullName" /><br /><br />
      
        <label>Email or phone:</label><br />
        <input type="text" name="contact" /><br /><br />
      
        <label>Will you attend the wedding weekend?</label><br />
        <select name="weekendAttendance">
          <option>Yes</option>
          <option>No</option>
        </select><br /><br />
      
        <label>Would you like to join the golf tournament on Friday morning?</label><br />
        <select name="golfAttendance">
          <option>No</option>
          <option>Yes</option>
        </select><br /><br />
      
        <label>Golf licence number:</label><br />
        <input type="text" name="golfLicence" /><br /><br />
      
        <label>Do you need a bus to the ceremony on Saturday?</label><br />
        <select name="saturdayBus">
          <option>No bus needed</option>
          <option>Yes - from Parador El Saler</option>
          <option>Yes - from central Valencia</option>
        </select><br /><br />
      
        <label>Will you attend the Sunday pool party?</label><br />
        <select name="poolPartyAttendance">
          <option>No</option>
          <option>Yes</option>
        </select><br /><br />
      
        <label>Do you need bus transport for the Sunday pool party?</label><br />
        <select name="poolPartyBus">
          <option>No</option>
          <option>Yes</option>
        </select><br /><br />
      
        <label>Dietary requirements:</label><br />
        <input type="text" name="dietaryRequirements" /><br /><br />
      
        <button type="submit">Submit</button>
      </form>
    
  </body>
</html>
