<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="event-details.html">Event Details</a>
        <a href="travel-stay.html">Travel & Stay</a>
        <a href="rsvp.html">RSVP</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </header>

    <main>
      <section class="hero" style="padding-bottom: 40px;">
        <p class="section-label">Wedding Weekend</p>
        <h1>RSVP</h1>
        <p>
          Please let us know your plans for the weekend, including attendance,
          transport and any relevant details.
        </p>
      </section>

      <section>
        <h2>Your Response</h2>

        <form>
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" />

          <label for="contact">Email or phone</label>
          <input type="text" id="contact" name="contact" />

          <label for="weekendAttendance">Will you attend the wedding weekend?</label>
          <select id="weekendAttendance" name="weekendAttendance">
            <option>Yes</option>
            <option>No</option>
          </select>

          <label for="golfAttendance">Would you like to join the golf tournament on Friday morning?</label>
          <select id="golfAttendance" name="golfAttendance">
            <option>No</option>
            <option>Yes</option>
          </select>

          <label for="golfLicence">Golf licence number</label>
          <input type="text" id="golfLicence" name="golfLicence" />

          <label for="saturdayBus">Do you need a bus to the ceremony on Saturday?</label>
          <select id="saturdayBus" name="saturdayBus">
            <option>No bus needed</option>
            <option>Yes - from Parador El Saler</option>
            <option>Yes - from central Valencia</option>
          </select>

          <label for="poolPartyAttendance">Will you attend the Sunday pool party?</label>
          <select id="poolPartyAttendance" name="poolPartyAttendance">
            <option>No</option>
            <option>Yes</option>
          </select>

          <label for="poolPartyBus">Do you need bus transport for the Sunday pool party?</label>
          <select id="poolPartyBus" name="poolPartyBus">
            <option>No</option>
            <option>Yes</option>
          </select>

          <label for="dietaryRequirements">Dietary requirements</label>
          <input
            type="text"
            id="dietaryRequirements"
            name="dietaryRequirements"
          />

          <button type="submit">Submit</button>
        </form>
      </section>
    </main>
  </body>
</html>
